services:
  db:
    image: postgres:16
    container_name: twochairs-postgres
    environment:
      POSTGRES_DB: twochairs
      POSTGRES_USER: twochairs
      POSTGRES_PASSWORD: twochairs
    ports:
      - "5432:5432"
    volumes:
      - twochairs_pgdata:/var/lib/postgresql/data

volumes:
  twochairs_pgdata: